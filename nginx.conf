server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # CRITICAL: Service worker must never be cached or auto-update won't work
    location ~* (sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Proxy API calls to local Peserta Node.js API
    location /api/peserta/ {
        proxy_pass http://api:3000/api/peserta/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Auth API calls (register digital account)
    location /api/auth/ {
        proxy_pass http://api:3000/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API calls to Tapera Sikumbang (avoids CORS in production)
    location /api/tapera/ {
        proxy_pass https://sikumbang.tapera.go.id/;
        proxy_set_header Host sikumbang.tapera.go.id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
    }

    # SPA fallback - serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
