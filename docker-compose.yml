version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    restart: always
    depends_on:
      - api

  api:
    build: ./server
    ports:
      - "3001:3000"
    environment:
      - POSTGRES_USER=tapera_user
      - POSTGRES_PASSWORD=tapera_password
      - POSTGRES_DB=tapera_db
      - POSTGRES_HOST=db
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=tapera_user
      - POSTGRES_PASSWORD=tapera_password
      - POSTGRES_DB=tapera_db
    volumes:
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
